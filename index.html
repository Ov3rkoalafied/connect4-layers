<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2-Layer Connect 4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
      color: #e0e0ff;
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 1.1rem;
      min-height: 40px;
    }

    #turn-indicator {
      font-weight: bold;
      font-size: 1.2rem;
    }

    #winner-msg {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffd700;
      display: none;
    }

    /* ── Player info panels ── */
    #players {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
    }

    .player-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .player-panel.active {
      border-color: #fff;
    }

    .player-panel .name {
      font-weight: bold;
      font-size: 1rem;
    }

    .player-panel .l2-counter {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .player-panel .l2-pips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 120px;
    }

    .l2-pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }

    .l2-pip.used {
      background: rgba(255,255,255,0.1);
    }

    /* ── Layer 2 mode button ── */
    #l2-btn {
      margin-bottom: 16px;
      padding: 8px 20px;
      border: 2px solid #888;
      border-radius: 8px;
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    #l2-btn:hover:not(:disabled) {
      border-color: #fff;
      color: #fff;
    }

    #l2-btn.active {
      background: #4a3f8f;
      border-color: #9b87ff;
      color: #fff;
    }

    #l2-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── Board ── */
    #board-wrapper {
      position: relative;
    }

    /* Column hover arrows */
    #col-arrows {
      display: grid;
      grid-template-columns: repeat(7, 80px);
      gap: 6px;
      margin-bottom: 4px;
    }

    .col-arrow {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 6px;
      font-size: 1.2rem;
      opacity: 0;
      transition: opacity 0.15s;
      color: #aaa;
    }

    .col-arrow:hover {
      opacity: 1;
    }

    #board-wrapper:hover .col-arrow {
      opacity: 0.4;
    }

    #board-wrapper:hover .col-arrow:hover {
      opacity: 1;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 80px);
      grid-template-rows: repeat(6, 80px);
      gap: 6px;
      background: #2a3a6e;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Cells ── */
    .cell {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1a1a2e;
      position: relative;
      cursor: default;
      transition: transform 0.1s;
    }

    /* Layer 1 piece — fills the cell */
    .cell .piece-l1 {
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      transition: background 0.15s;
    }

    /* Layer 2 piece — sits on top with a distinct ring */
    .cell .piece-l2 {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 10px rgba(255,255,255,0.5), inset 0 0 6px rgba(0,0,0,0.3);
      transition: background 0.15s;
    }

    /* Colors */
    .p1 { background: #e63946; }
    .p2 { background: #f4d03f; }

    /* Winning cells get a glow */
    .cell.winner-cell .piece-l1,
    .cell.winner-cell .piece-l2 {
      box-shadow: 0 0 18px 6px rgba(255,255,255,0.7);
    }

    /* Layer 2 placement mode — occupied cells become clickable targets */
    body.l2-mode .cell.occupied {
      cursor: crosshair;
    }

    body.l2-mode .cell.occupied:hover {
      transform: scale(1.08);
    }

    /* Normal mode — column arrows active */
    body:not(.l2-mode) .col-arrow {
      cursor: pointer;
    }

    /* ── New game button ── */
    #new-game-btn {
      margin-top: 24px;
      padding: 10px 32px;
      background: #2a3a6e;
      border: 2px solid #4a6aae;
      border-radius: 10px;
      color: #ddf;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    #new-game-btn:hover {
      background: #3a4a8e;
      border-color: #88aaff;
    }

    /* ── Legend ── */
    #legend {
      margin-top: 20px;
      font-size: 0.8rem;
      opacity: 0.55;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <h1>2-Layer Connect 4</h1>

  <div id="status-bar">
    <div id="turn-indicator"></div>
    <div id="winner-msg"></div>
  </div>

  <div id="players">
    <div class="player-panel" id="panel-p1">
      <div class="name" style="color:#e63946">Player 1 (Red)</div>
      <div class="l2-counter">Layer 2 pieces: <span id="p1-l2-count">7</span></div>
      <div class="l2-pips" id="p1-pips"></div>
    </div>
    <div class="player-panel" id="panel-p2">
      <div class="name" style="color:#f4d03f">Player 2 (Yellow)</div>
      <div class="l2-counter">Layer 2 pieces: <span id="p2-l2-count">7</span></div>
      <div class="l2-pips" id="p2-pips"></div>
    </div>
  </div>

  <button id="l2-btn">Place Layer 2 Piece</button>

  <div id="board-wrapper">
    <div id="col-arrows"></div>
    <div id="board"></div>
  </div>

  <button id="new-game-btn">New Game</button>

  <div id="legend">
    Normal piece = full circle &nbsp;|&nbsp; Layer 2 piece = smaller circle with white ring<br>
    Only the TOP piece in each cell counts toward winning.
  </div>

<script>
  const COLS = 7, ROWS = 6, L2_START = 7;

  // State
  let board, currentPlayer, l2Remaining, l2Mode, gameOver;

  function initGame() {
    // board[col][row] = { l1: null|1|2, l2: null|1|2 }
    board = Array.from({ length: COLS }, () =>
      Array.from({ length: ROWS }, () => ({ l1: null, l2: null }))
    );
    currentPlayer = 1;
    l2Remaining = { 1: L2_START, 2: L2_START };
    l2Mode = false;
    gameOver = false;
    document.body.classList.remove('l2-mode');
    render();
  }

  // ── Helpers ──────────────────────────────────────────

  function topPiece(col, row) {
    const cell = board[col][row];
    if (cell.l2 !== null) return cell.l2;
    if (cell.l1 !== null) return cell.l1;
    return null;
  }

  function isOccupied(col, row) {
    return board[col][row].l1 !== null;
  }

  // Lowest empty row in a column (for layer 1 gravity), or -1 if full
  function dropRow(col) {
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[col][r].l1 === null) return r;
    }
    return -1;
  }

  // ── Win detection ─────────────────────────────────────

  function checkWin() {
    const lines = getWinningLines();
    for (const line of lines) {
      const colors = line.map(([c, r]) => topPiece(c, r));
      if (colors[0] !== null && colors.every(x => x === colors[0])) {
        return { winner: colors[0], line };
      }
    }
    return null;
  }

  function getWinningLines() {
    const lines = [];
    // Horizontal
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c <= COLS - 4; c++)
        lines.push([[c,r],[c+1,r],[c+2,r],[c+3,r]]);
    // Vertical
    for (let c = 0; c < COLS; c++)
      for (let r = 0; r <= ROWS - 4; r++)
        lines.push([[c,r],[c,r+1],[c,r+2],[c,r+3]]);
    // Diagonal down-right
    for (let c = 0; c <= COLS - 4; c++)
      for (let r = 0; r <= ROWS - 4; r++)
        lines.push([[c,r],[c+1,r+1],[c+2,r+2],[c+3,r+3]]);
    // Diagonal down-left
    for (let c = 3; c < COLS; c++)
      for (let r = 0; r <= ROWS - 4; r++)
        lines.push([[c,r],[c-1,r+1],[c-2,r+2],[c-3,r+3]]);
    return lines;
  }

  function checkDraw() {
    for (let c = 0; c < COLS; c++)
      if (dropRow(c) !== -1) return false;
    return true;
  }

  // ── Actions ───────────────────────────────────────────

  function dropPiece(col) {
    if (gameOver || l2Mode) return;
    const row = dropRow(col);
    if (row === -1) return; // column full
    board[col][row].l1 = currentPlayer;
    afterMove();
  }

  function placeL2(col, row) {
    if (gameOver || !l2Mode) return;
    if (!isOccupied(col, row)) return;
    if (board[col][row].l2 !== null) return; // already has l2
    if (l2Remaining[currentPlayer] <= 0) return;
    board[col][row].l2 = currentPlayer;
    l2Remaining[currentPlayer]--;
    l2Mode = false;
    document.body.classList.remove('l2-mode');
    afterMove();
  }

  function afterMove() {
    const result = checkWin();
    if (result) {
      gameOver = true;
      render(result.line);
      return;
    }
    if (checkDraw()) {
      gameOver = true;
      render(null, true);
      return;
    }
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    render();
  }

  function toggleL2Mode() {
    if (gameOver) return;
    if (l2Remaining[currentPlayer] <= 0) return;
    l2Mode = !l2Mode;
    document.body.classList.toggle('l2-mode', l2Mode);
    render();
  }

  // ── Render ────────────────────────────────────────────

  function render(winLine = null, isDraw = false) {
    renderBoard(winLine);
    renderStatus(winLine, isDraw);
    renderPlayers();
    renderL2Btn();
  }

  function renderBoard(winLine) {
    const boardEl = document.getElementById('board');
    const arrowsEl = document.getElementById('col-arrows');
    boardEl.innerHTML = '';
    arrowsEl.innerHTML = '';

    const winCells = new Set(winLine ? winLine.map(([c,r]) => `${c},${r}`) : []);

    // Column arrows (row 0 = visual top, which is array index 0)
    for (let c = 0; c < COLS; c++) {
      const arrow = document.createElement('div');
      arrow.className = 'col-arrow';
      arrow.textContent = '▼';
      if (!gameOver && !l2Mode) {
        arrow.addEventListener('click', () => dropPiece(c));
      }
      arrowsEl.appendChild(arrow);
    }

    // Cells: row 0 is top of board visually, ROWS-1 is bottom
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const data = board[c][r];

        if (data.l1 !== null) {
          cell.classList.add('occupied');
          const p1el = document.createElement('div');
          p1el.className = `piece-l1 p${data.l1}`;
          cell.appendChild(p1el);
        }

        if (data.l2 !== null) {
          const p2el = document.createElement('div');
          p2el.className = `piece-l2 p${data.l2}`;
          cell.appendChild(p2el);
        }

        if (winCells.has(`${c},${r}`)) {
          cell.classList.add('winner-cell');
        }

        // Click handlers
        if (!gameOver) {
          if (l2Mode && data.l1 !== null && data.l2 === null) {
            cell.addEventListener('click', () => placeL2(c, r));
          } else if (!l2Mode) {
            cell.addEventListener('click', () => dropPiece(c));
          }
        }

        boardEl.appendChild(cell);
      }
    }
  }

  function renderStatus(winLine, isDraw) {
    const turnEl = document.getElementById('turn-indicator');
    const winnerEl = document.getElementById('winner-msg');

    if (winLine) {
      const winner = topPiece(...winLine[0]);
      turnEl.style.display = 'none';
      winnerEl.style.display = 'block';
      winnerEl.style.color = winner === 1 ? '#e63946' : '#f4d03f';
      winnerEl.textContent = `Player ${winner} wins! 🎉`;
    } else if (isDraw) {
      turnEl.style.display = 'none';
      winnerEl.style.display = 'block';
      winnerEl.style.color = '#aaa';
      winnerEl.textContent = "It's a draw!";
    } else {
      turnEl.style.display = 'block';
      winnerEl.style.display = 'none';
      const color = currentPlayer === 1 ? '#e63946' : '#f4d03f';
      const modeText = l2Mode ? ' — Layer 2 mode: click a cell to cover it' : '';
      turnEl.innerHTML = `<span style="color:${color}">Player ${currentPlayer}'s turn</span>${modeText}`;
    }
  }

  function renderPlayers() {
    [1, 2].forEach(p => {
      const panel = document.getElementById(`panel-p${p}`);
      panel.classList.toggle('active', currentPlayer === p && !gameOver);
      document.getElementById(`p${p}-l2-count`).textContent = l2Remaining[p];

      const pips = document.getElementById(`p${p}-pips`);
      pips.innerHTML = '';
      for (let i = 0; i < L2_START; i++) {
        const pip = document.createElement('div');
        pip.className = 'l2-pip' + (i >= l2Remaining[p] ? ' used' : '');
        pips.appendChild(pip);
      }
    });
  }

  function renderL2Btn() {
    const btn = document.getElementById('l2-btn');
    btn.disabled = gameOver || l2Remaining[currentPlayer] <= 0;
    btn.classList.toggle('active', l2Mode);
    btn.textContent = l2Mode ? '✕ Cancel Layer 2' : 'Place Layer 2 Piece';
  }

  // ── Event listeners ───────────────────────────────────

  document.getElementById('l2-btn').addEventListener('click', toggleL2Mode);
  document.getElementById('new-game-btn').addEventListener('click', initGame);

  // ── Start ─────────────────────────────────────────────
  initGame();
</script>
</body>
</html>
